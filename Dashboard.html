<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>95 CLUB</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
padding-bottom:80px;
}

.header{
background:linear-gradient(90deg,#ff5f6d,#ff8f70);
padding:20px;
color:white;
text-align:center;
font-size:30px;
font-weight:bold;
}

.wallet{
background:white;
margin:15px;
padding:20px;
border-radius:20px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}

.balance{
font-size:32px;
font-weight:bold;
}

.actions{
display:flex;
gap:10px;
margin-top:15px;
}

.actions button{
flex:1;
padding:12px;
border:none;
border-radius:25px;
color:white;
font-size:18px;
}

.deposit{
background:#00c853;
}

.reward{
background:#ff6d6d;
}

.notice{
margin:15px;
background:white;
padding:15px;
border-radius:15px;
font-weight:bold;
}

.banner{
margin:15px;
height:140px;
border-radius:20px;
background:linear-gradient(45deg,#ff5f6d,#ffc371);
display:flex;
justify-content:center;
align-items:center;
color:white;
font-size:28px;
font-weight:bold;
}

.games{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
padding:15px;
}

.game{
background:white;
border-radius:18px;
overflow:hidden;
box-shadow:0 2px 8px rgba(0,0,0,.1);
}

.game img{
width:100%;
height:120px;
object-fit:cover;
}

.game h3{
padding:12px;
text-align:center;
}

.bottom{
position:fixed;
bottom:0;
left:0;
right:0;
background:white;
display:flex;
justify-content:space-around;
padding:12px;
box-shadow:0 -2px 10px rgba(0,0,0,.1);
}
</style>
</head>

<body>

<div class="header">
95 CLUB
</div>

<div class="wallet">
<div class="balance" id="coins">1000 Coins</div>

<div class="actions">
<button class="deposit">Deposit</button>
<button class="reward" onclick="reward()">Daily Reward</button>
</div>
</div>

<div class="notice">
📢 Welcome to 95 CLUB Virtual Coin Games
</div>

<div class="banner">
WELCOME BONUS
</div>

<div class="games">

<div class="game"
onclick="window.location.href='Wingo.html'"
style="cursor:pointer;">

<img src="https://via.placeholder.com/300x120">

<h3>🎯 Wingo</h3>

</div>

<div class="game">
<img src="https://via.placeholder.com/300x120">
<h3>✈️ Aviator</h3>
</div>

<div class="game">
<img src="https://via.placeholder.com/300x120">
<h3>💣 Mines</h3>
</div>

<div class="game">
<img src="https://via.placeholder.com/300x120">
<h3>🎲 Dice</h3>
</div>

<div class="game">
<img src="https://via.placeholder.com/300x120">
<h3>🪙 Coin Flip</h3>
</div>

<div class="game">
<img src="https://via.placeholder.com/300x120">
<h3>🐉 Dragon Tiger</h3>
</div>

</div>

<div class="bottom">
<div>🏠 Home</div>
<div>🎮 Games</div>
<div>🎁 Rewards</div>
<div>👤 Account</div>
</div>

<script>
let coins = 1000;

function reward(){
coins += 100;
document.getElementById("coins").innerHTML =
coins + " Coins";
alert("You received 100 coins");
}
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>95 CLUB Registration</title>
<style>
body{
background:#111;
font-family:Arial,sans-serif;
color:white;
text-align:center;
padding:20px;
}
.box{
background:#222;
padding:20px;
border-radius:15px;
max-width:400px;
margin:auto;
}
h1{
color:red;
}
input{
width:90%;
padding:15px;
margin:10px 0;
border:none;
border-radius:10px;
font-size:18px;
}
button{
width:95%;
padding:15px;
margin-top:10px;
border:none;
border-radius:10px;
background:red;
color:white;
font-size:18px;
font-weight:bold;
}
</style>
</head>
<body>
<h1>95 CLUB</h1>
<div class="box">
<h2>Register</h2>
<input type="text" id="phone" placeholder="+91XXXXXXXXXX">
<button id="sendOtp">Send OTP</button>


<input type="text" id="otp" placeholder="Enter OTP">
<input type="password" id="password" placeholder="Create Password">
<button id="verifyOtp">Create Account</button>


<div id="recaptcha-container"></div>
</div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
getAuth,
RecaptchaVerifier,
signInWithPhoneNumber
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
const firebaseConfig = {
apiKey: "AIzaSyDoOLCG3HgaH5Xa5HrfA6-na3vG1cBIT34",
authDomain: "club-67130.firebaseapp.com",
projectId: "club-67130",
storageBucket: "club-67130.firebasestorage.app",
messagingSenderId: "261340575874",
appId: "1:261340575874:web:6522d1ff73e68e86bf9c9b"
};
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
window.recaptchaVerifier = new RecaptchaVerifier(
auth,
"recaptcha-container",
{
size: "normal"
}
);
document.getElementById("sendOtp").addEventListener("click", () => {
const phone = document.getElementById("phone").value;
signInWithPhoneNumber(
auth,
phone,
window.recaptchaVerifier
)
.then((confirmationResult) => {
window.confirmationResult = confirmationResult;
alert("OTP Sent");
})
.catch((error) => {
alert(error.message);
});
});
document.getElementById("verifyOtp").addEventListener("click", () => {
const otp = document.getElementById("otp").value;
window.confirmationResult.confirm(otp)
.then(() => {
alert("Registration Successful");
window.location.href = "Login.html";
})
.catch(() => {
alert("Wrong OTP");
});
});
</script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Wingo Game</title>
<style>
body{
font-family:Arial;
background:#f5f5f5;
margin:0;
padding:20px;
text-align:center;
}
.wallet{
background:white;
padding:20px;
border-radius:15px;
margin-bottom:20px;
}
.balance{
font-size:30px;
font-weight:bold;
}
.timer{
background:#ff6d6d;
color:white;
padding:20px;
border-radius:15px;
font-size:40px;
margin-bottom:20px;
}
.betBtn{
width:45%;
padding:15px;
border:none;
border-radius:15px;
font-size:24px;
color:white;
margin:5px;
}
.big{
background:#f0ad4e;
}
.small{
background:#5bc0de;
}
.result{
margin-top:20px;
font-size:24px;
font-weight:bold;
}
</style>
</head>
<body>
<div class="wallet">
<div class="balance" id="coins">1000 Coins</div>
</div>
<div class="timer" id="timer">
10
</div>
<button class="betBtn big" onclick="betBig()">BIG</button>
<button class="betBtn small" onclick="betSmall()">SMALL</button>
<div class="result" id="result">
Place your bet
</div>
<script>
let coins = 1000;
let selectedBet = "";
function betBig(){
selectedBet = "BIG";
document.getElementById("result").innerHTML =
"Bet placed on BIG";
}
function betSmall(){
selectedBet = "SMALL";
document.getElementById("result").innerHTML =
"Bet placed on SMALL";
}
let time = 10;
setInterval(function(){
time--;
document.getElementById("timer").innerHTML = time;
if(time<=0){
let number = Math.floor(Math.random()*10);
let outcome =
(number>=5) ? "BIG" : "SMALL";
if(selectedBet!=""){
if(selectedBet==outcome){
coins += 100;
alert("You Won! Number: "+number);
}else{
coins -= 100;
alert("You Lost! Number: "+number);
}
document.getElementById("coins").innerHTML =
coins + " Coins";
selectedBet = "";
}
time = 10;
}
},1000);
</script>
</body>
</html>
